<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- Chargement des bibliothèques nécessaires 📦 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <!-- Configuration de la scène AR 🎥 -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Conteneur où le script va injecter les marqueurs 🏗️ -->
      <a-entity id="vignettes-eleves"></a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const conteneur = document.querySelector('#vignettes-eleves');

      // 1. On récupère la liste des élèves actifs depuis le fichier JSON 📂
      fetch('docs/eleves.json')
        .then(reponse => reponse.json())
        .then(donnees => {
          const liste = donnees.eleves_actifs;

          // 2. On boucle sur chaque numéro d'élève présent dans la liste 🔄
          liste.forEach(id => {
            // Création du marqueur .patt
            const marqueur = document.createElement('a-marker');
            marqueur.setAttribute('type', 'pattern');
            marqueur.setAttribute('url', `docs/eleve_${id}.patt`);

            // Création de l'image .png associée
            const image = document.createElement('a-image');
            image.setAttribute('src', `docs/image_${id}.png`);
            image.setAttribute('rotation', '-90 0 0'); // À plat sur le marqueur
            image.setAttribute('width', '1');
            image.setAttribute('height', '1');

            // On assemble et on ajoute à la scène 🧩
            marqueur.appendChild(image);
            conteneur.appendChild(marqueur);
          });
        })
        .catch(erreur => {
          console.error("Problème pour lire le fichier JSON :", erreur);
        });
    </script>
  </body>
</html>
